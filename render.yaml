# Free-tier Render Blueprint (spins down after ~15 min idle — OK for demos)
services:
  - type: web
    name: cortex-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma db push && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PLATFORM_ADMIN_EMAIL
        value: admin@cortex.in
      - key: PLATFORM_ADMIN_PASSWORD
        sync: false
