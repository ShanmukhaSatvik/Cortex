name: Build API image

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/build-api-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/shanmukhasatvik/cortex-api:latest
            ghcr.io/shanmukhasatvik/cortex-api:${{ github.sha }}
